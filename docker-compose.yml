
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: svguser
      POSTGRES_PASSWORD: svgpass
      POSTGRES_DB: svgconverter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svguser -d svgconverter"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://svguser:svgpass@postgres:5432/svgconverter?sslmode=disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET: dev-secret-change-in-prod
      GITHUB_CLIENT_ID: "Ov23liwtkDzU3n2yvRLJ"
      GITHUB_CLIENT_SECRET: "cd5b23353a2bd0ade00105b12e789647773920b9"
      FRONTEND_URL: "http://10.100.1.124:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://svguser:svgpass@postgres:5432/svgconverter?sslmode=disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  pgdata:
  miniodata:
